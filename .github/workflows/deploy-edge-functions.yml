name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Discover and deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Coleta toda pasta em supabase/functions/ que tenha index.ts
          # e ignora módulos compartilhados (prefixo "_").
          fns=()
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            case "$name" in _*) echo "Pulando módulo compartilhado: $name"; continue;; esac
            if [ ! -f "$dir/index.ts" ]; then
              echo "Pulando $name (sem index.ts)"
              continue
            fi
            fns+=("$name")
          done

          if [ ${#fns[@]} -eq 0 ]; then
            echo "Nenhuma edge function encontrada."
            exit 0
          fi

          echo "Funções a deployar (${#fns[@]}): ${fns[*]}"

          failed=()
          for name in "${fns[@]}"; do
            echo "::group::Deploy $name"
            if supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_ID"; then
              echo "OK: $name"
            else
              echo "FALHOU: $name"
              failed+=("$name")
            fi
            echo "::endgroup::"
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::Falharam ${#failed[@]} função(ões): ${failed[*]}"
            exit 1
          fi
